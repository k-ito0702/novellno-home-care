<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NOVELLNO ケアレシピ診断</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3461/3461285.png">
    <meta name="theme-color" content="#4a4238">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        .font-serif-jp { font-family: 'Shippori Mincho', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ddd3c3; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        button:active { transform: scale(0.97); transition: 0.1s; }
        body { overscroll-behavior-y: contain; -webkit-tap-highlight-color: transparent; background-color: #ece5d8; font-family: 'Zen Kaku Gothic New', -apple-system, sans-serif; }
        #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f8f4ec; z-index: 1000; font-weight: bold; color: #8a7a63; font-family: 'Shippori Mincho', serif; letter-spacing: 0.2em; }
    </style>
</head>
<body>
    <div id="loading">NOVELLNO</div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // アイコン描画
        const Icon = ({ name, size = 24, className = "" }) => {
            const icons = {
                leaf: <React.Fragment><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></React.Fragment>,
                check: <polyline points="20 6 9 17 4 12"/>,
                refresh: <React.Fragment><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></React.Fragment>,
                sparkles: <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/>,
                plus: <React.Fragment><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></React.Fragment>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState('intro');
            const [answers, setAnswers] = useState({ shampoo: null, treatment: null });

            useEffect(() => {
                const loader = document.getElementById('loading');
                if (loader) loader.style.display = 'none';
            }, []);

            // LP（lp-novellno.mikuchi.jp/A19）・POPに基づく商品データ
            const products = {
                shampoo: {
                    SI: { name: 'Shampoo SI', kana: 'シャンプー エスアイ', tag: 'シルク由来のPPT配合で軽やかな髪へ', target: 'ローダメージ毛向け', desc: '髪の表面を整え、柔軟性となめらかさを与えます。柔らかく、サラサラな髪へと導きます。', ingredients: 'ラウロイル加水分解シルクNa（PPT系洗浄成分）／加水分解シルク（毛髪保護成分）', price: '300mL ¥3,960 ／ 580mLリフィル ¥5,720', style: 'bg-[#edeadf] border-[#b3ad94] text-[#66634c]' },
                    CO: { name: 'Shampoo CO', kana: 'シャンプー シーオー', tag: 'コラーゲン由来のPPT配合で潤いのある髪へ', target: 'ミドルダメージ毛向け', desc: '髪内部に潤いを与え、乾燥を防ぎます。潤いとまとまりのある髪へと導きます。', ingredients: 'ココイル加水分解コラーゲンK（PPT系洗浄成分）／加水分解コラーゲン（毛髪保護成分）', price: '300mL ¥3,960 ／ 580mLリフィル ¥5,720', style: 'bg-[#f2e5df] border-[#c39d8c] text-[#835644]' },
                    KE: { name: 'Shampoo KE', kana: 'シャンプー ケーイー', tag: 'ケラチン由来のPPT配合でしなやかな髪へ', target: 'ハイダメージ毛向け', desc: '髪内部を補修し、ダメージ等で失われたハリ・コシを補います。しなやかな弾力のある髪へと導きます。', ingredients: 'ココイル加水分解ケラチンK（PPT系洗浄成分）／加水分解ケラチン（羊毛）（毛髪保護成分）', price: '300mL ¥3,960 ／ 580mLリフィル ¥5,720', style: 'bg-[#f1e6d4] border-[#bd9b66] text-[#775526]' },
                },
                treatment: {
                    SM: { name: 'Treatment SM', kana: 'トリートメント エスエム', tag: '軽やかでサラサラな髪へ', target: '', desc: 'キューティクルを均一に整え、スムーズな指通りへ。軽やかで艶やか、サラサラな髪へと導きます。', ingredients: '', price: '230g ¥3,960 ／ 550gリフィル ¥5,720', style: 'bg-[#f7f0e1] border-[#d2bd90] text-[#826c3e]' },
                    SL: { name: 'Treatment SL', kana: 'トリートメント エスエル', tag: 'しなやかでまとまりのある髪へ', target: '', desc: '柔らかさと適度な潤いを両立。膨らみを抑え、しなやかでまとまりのある髪へと導きます。', ingredients: '', price: '230g ¥3,960 ／ 550gリフィル ¥5,720', style: 'bg-[#f0e7da] border-[#bfa47f] text-[#75593a]' },
                    MO: { name: 'Treatment MO', kana: 'トリートメント エムオー', tag: 'なめらかで潤いのある髪へ', target: '', desc: '髪内部まで潤いを補い、保湿感を与えます。毛先までなめらかで潤いのある髪へと導きます。', ingredients: '', price: '230g ¥3,960 ／ 550gリフィル ¥5,720', style: 'bg-[#e9ebed] border-[#9fa8b0] text-[#4f5a64]' },
                }
            };

            // アウトバス2種（結果画面で常に提案）
            const outbath = [
                { name: 'Boost Emulsion', kana: 'ブースト エマルジョン', price: '150g ¥3,300', desc: '髪に潤いを与え、乱れやすい髪のコンディションを整えます。毎日のケアで、しなやかでなめらかな髪へと導きます。アウトバス／インバスのどちらでもご使用いただけます。', ingredients: 'ハイパーナノCMC・エルカラクトン（毛髪保護成分）／トシルバリンNa（コンディショニング成分）', usage: 'インバス：シャンプー後、水気を切った髪の毛先〜中間に塗布し3〜5分置いた後、トリートメントを重ねます。アウトバス：タオルドライ後、毛先〜中間に薄く塗布して乾かします。', dosage: '使用量目安：ショート 0.5〜1push ／ ミディアム 1〜1.5push ／ ロング 3push', style: 'bg-[#ece1d8] border-[#ab8e7b] text-[#684e3e]' },
                { name: 'Protection Oil', kana: 'プロテクション オイル', price: '50g ¥3,300', desc: '熱ダメージをケアし、仕上がりを底上げするベースケア。キューティクルを整え、自然なツヤを与えます。潤いを保ちながら、なめらかで扱いやすい髪へと導きます。', ingredients: 'スクワラン（油脂成分）／イソステアロイル加水分解ケラチン(羊毛)・コラーゲン・シルク（毛髪保護成分）', usage: '適量を手に取り、毛先から中間部分を中心に塗布してください。', dosage: '', style: 'bg-[#efe9df] border-[#b3a276] text-[#665729]' }
            ];

            // LPの9通りのケアレシピ解説
            const recipes = {
                'SI-SM': { title: 'するっとまとまる、シルク質感ケア', copy: '重たくないのに、毛先までなめらか。サラサラなのに、パサついて見えない。そんな理想の質感を目指した、シルクベースの組み合わせ。シャンプーSIが髪をやさしく洗い上げ、軽やかな指通りへ。さらに、シルク由来成分※を配合したトリートメントSMが髪表面をコートし、乾燥や摩擦から髪を保護します。するっとほどけるような指通りと、自然にまとまるツヤ感を。', note: '※加水分解シルク、（加水分解シルク／PGプロピルメチルシランジオール）クロスポリマー（毛髪保護成分）' },
                'SI-SL': { title: 'やわらかくまとまる、しなやかな質感ケア', copy: '「サラサラだけでは物足りない。でも、重たくなるのは苦手。」そんな髪に向けた、シルク×ケラチンベースの組み合わせ。シャンプーSIが髪をやさしく洗い上げ、なめらかな指通りへ。さらに、加水分解ケラチン※1とリピジュア®※2を配合したトリートメントSLが、髪にうるおいを与えながら、毛先までやわらかくしなやかな質感へ整えます。軽さを残しながら、自然にまとまる。ごわつきを感じにくい、扱いやすい髪印象へ。', note: '※1 加水分解ケラチン（カシミヤヤギ）（毛髪保護成分）　※2 ポリクオタニウム-61（毛髪保護成分）' },
                'SI-MO': { title: 'うるおい続く、しっとり質感ケア', copy: '「毛先のパサつきや広がりが気になる。でも、重たすぎる質感にはしたくない。」そんな髪に向けた、シルク×うるおいケアの組み合わせ。シャンプーSIが髪をやさしく洗い上げ、なめらかな指通りへ。さらに、コラーゲン※1と異性化糖※2を配合したトリートメントMOが、髪にうるおいを与え、乾燥による広がりを抑えながら、毛先までしっとりまとまる質感へ整えます。やわらかさを残しながら、自然に落ち着く。毛先までまとまりやすい、なめらかな髪印象へ。', note: '※1 加水分解コラーゲン（毛髪保護成分）　※2 異性化糖（毛髪保護成分）' },
                'CO-SM': { title: 'うるおいは欲しい。だけど、重たくしたくない髪へ', copy: 'カラーやパーマを繰り返すことで、乾燥やパサつきが気になりはじめた髪に。コラーゲン系洗浄成分を配合したシャンプーCOが、うるおいを残しながらやさしく洗い上げ、パサついて見えやすい髪をやわらかな質感へ整えます。さらに、シルク由来成分※を配合したトリートメントSMが髪表面をなめらかにコート。しっとり感を保ちながらも、重さを感じにくい軽やかな指通りへ導きます。みずみずしさとサラサラ感を両立する組み合わせです。', note: '※加水分解シルク、（加水分解シルク／PGプロピルメチルシランジオール）クロスポリマー（毛髪保護成分）' },
                'CO-SL': { title: 'うるおいを抱え込み、やわらかくまとまる髪へ', copy: '乾燥によるパサつきや、毛先のまとまりにくさが気になりはじめた髪に。コラーゲン系洗浄成分を配合したシャンプーCOが、うるおいを残しながらやさしく洗い上げ、乾燥によるパサつきを抑えながら、やわらかな質感へ整えます。さらに、加水分解ケラチン※1とリピジュア®※2を配合したトリートメントSLが、髪にうるおいを与えながら、しなやかで扱いやすい質感へ。しっとり感はあるのに、重たくなりすぎない。毛先まで自然にまとまり、やわらかく動く髪印象へ導きます。', note: '※1 加水分解ケラチン（カシミヤヤギ）（毛髪保護成分）　※2 ポリクオタニウム-61（毛髪保護成分）' },
                'CO-MO': { title: '乾燥・広がりが気になる髪に', copy: 'うるおい集中ケア。パサつきや広がりで、髪がまとまりにくく感じるときに。コラーゲン系洗浄成分を配合したシャンプーCOが、うるおいを残しながらやさしく洗い上げ、乾燥によるごわつきを抑えながら、やわらかな質感へ整えます。さらに、コラーゲン※1と異性化糖※2を配合したトリートメントMO（モイスト）が、髪にうるおいを与え、毛先までしっとりまとまる質感へ。乾燥で広がりやすい髪も、毛先までなめらかに。落ち着きのある、まとまりやすい髪印象へ導きます。', note: '※1 加水分解コラーゲン（毛髪保護成分）　※2 異性化糖（毛髪保護成分）' },
                'KE-SM': { title: 'ダメージによるパサつきに', copy: '軽やかな指通りケア。カラーやパーマの繰り返しによる乾燥や、引っかかりが気になりはじめた髪に。ケラチン系洗浄成分を配合したシャンプーKEが、髪をやさしく洗い上げながら、ダメージを受けた髪をなめらかな質感へ整えます。さらに、シルク由来成分※を配合したトリートメントSMが髪表面をコートし、摩擦によるパサつきや絡まりを抑えながら、軽やかな指通りへ。重たさを感じにくいのに、毛先までするっとまとまる。ギシつきやすい髪も、指通りのよいサラサラ質感へ導きます。', note: '※加水分解シルク、（加水分解シルク／PGプロピルメチルシランジオール）クロスポリマー（毛髪保護成分）' },
                'KE-SL': { title: 'ダメージによるごわつきに', copy: 'しなやかにまとまる補修ケア。繰り返すカラーやパーマによって、髪のごわつきや扱いにくさが気になりはじめた髪に。ケラチン系洗浄成分を配合したシャンプーKEが、髪をやさしく洗い上げながら、ダメージによるパサつきや引っかかりを抑え、なめらかな質感へ整えます。さらに、加水分解ケラチン※1とリピジュア®※2を配合したトリートメントSLが、髪にうるおいを与えながら、やわらかくしなやかな質感へ。重たくなりすぎず、毛先まで自然にまとまる。ごわつきやすい髪も、指通りのよい扱いやすい髪印象へ導きます。', note: '※1 加水分解ケラチン（カシミヤヤギ）（毛髪保護成分）　※2 ポリクオタニウム-61（毛髪保護成分）' },
                'KE-MO': { title: '乾燥・広がりを抑え、しっとりまとまる集中補修ケア', copy: 'ブリーチや縮毛矯正の繰り返しによる乾燥やパサつき、広がりが気になる髪に。ケラチン系洗浄成分を配合したシャンプーKEが、髪をやさしく洗い上げながら、ダメージによるごわつきや引っかかりを抑え、なめらかな質感へ整えます。さらに、コラーゲン※1と異性化糖※2を配合したトリートメントMOが、髪にうるおいを与え、毛先までしっとりまとまりやすい質感へ。乾燥で広がりやすい髪も、重たくならず自然にまとまる。毛先までなめらかに整った、落ち着きのある髪印象へ導きます。', note: '※1 加水分解コラーゲン（毛髪保護成分）　※2 異性化糖（毛髪保護成分）' }
            };

            const q1Options = [
                { id: 'SI', label: 'A', text: 'カラーやパーマはしているけど、ダメージはまだ深刻ではない。サラサラな質感をキープしたい。' },
                { id: 'CO', label: 'B', text: '定期的なカラーやパーマによる、乾燥やパサつきが気になる。' },
                { id: 'KE', label: 'C', text: 'ブリーチ・縮毛矯正・カラーなどを繰り返し、ダメージやごわつきを感じる。' }
            ];

            const q2Options = [
                { id: 'SM', label: 'A', text: '軽やかで、サラサラな指通り' },
                { id: 'SL', label: 'B', text: 'やわらかく、しなやかにまとまる質感' },
                { id: 'MO', label: 'C', text: '毛先までしっとりまとまる、うるおい感のある質感' }
            ];

            const selectAnswer = (key, val) => {
                setAnswers({ ...answers, [key]: val });
                if (key === 'shampoo') setStep('q2');
                else setStep('result');
            };

            const restart = () => {
                setAnswers({ shampoo: null, treatment: null });
                setStep('intro');
            };

            const sh = products.shampoo[answers.shampoo] || products.shampoo.SI;
            const tr = products.treatment[answers.treatment] || products.treatment.SM;
            const recipe = recipes[`${answers.shampoo || 'SI'}-${answers.treatment || 'SM'}`];

            const ProgressBar = ({ current }) => (
                <div className="flex items-center justify-center gap-2 text-[8px] font-bold tracking-wider text-[#a99e8c] mb-5">
                    <span className={`flex items-center gap-1 ${current >= 1 ? 'text-[#4a4238]' : ''}`}><span className={`w-4 h-4 rounded-full flex items-center justify-center text-white ${current >= 1 ? 'bg-[#4a4238]' : 'bg-[#d8cdb9]'}`}>1</span>シャンプー選択</span>
                    <span className="w-6 h-px bg-[#d8cdb9]"></span>
                    <span className={`flex items-center gap-1 ${current >= 2 ? 'text-[#4a4238]' : ''}`}><span className={`w-4 h-4 rounded-full flex items-center justify-center text-white ${current >= 2 ? 'bg-[#4a4238]' : 'bg-[#d8cdb9]'}`}>2</span>トリートメント選択</span>
                    <span className="w-6 h-px bg-[#d8cdb9]"></span>
                    <span className={`flex items-center gap-1 ${current >= 3 ? 'text-[#4a4238]' : ''}`}><span className={`w-4 h-4 rounded-full flex items-center justify-center text-white ${current >= 3 ? 'bg-[#4a4238]' : 'bg-[#d8cdb9]'}`}>✓</span>ケアレシピ結果</span>
                </div>
            );

            const ProductCard = ({ label, item }) => (
                <div className={`p-4 border-l-4 rounded-r-2xl ${item.style} shadow-sm animate-fade-in`}>
                    <div className="text-[9px] font-bold opacity-60 uppercase tracking-widest">{label}</div>
                    <div className="font-serif-jp text-lg font-semibold mt-0.5">{item.name}</div>
                    <div className="text-[9px] opacity-60 tracking-widest">{item.kana}</div>
                    <div className="text-[10px] font-bold mt-1.5 bg-white/60 inline-block px-2 py-0.5 rounded-full">{item.tag}</div>
                    <p className="text-[11px] mt-2 leading-relaxed">{item.desc}</p>
                    {item.ingredients && <p className="text-[8px] mt-1.5 opacity-70 leading-relaxed">配合成分：{item.ingredients}</p>}
                    <div className="flex justify-between items-end mt-2 pt-2 border-t border-black/5">
                        <span className="text-[9px] opacity-70">{item.target}</span>
                        <span className="text-[10px] font-bold">{item.price}</span>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-full flex items-center justify-center p-2">
                    <div className="max-w-md w-full bg-[#f8f4ec] shadow-2xl rounded-[2.5rem] overflow-hidden h-full max-h-[850px] flex flex-col border-[6px] border-[#4a4238] relative">

                        <header className="bg-[#4a4238] text-[#f3ede1] p-6 pb-8 text-center relative shrink-0 pt-9">
                            <h1 className="font-serif-jp text-2xl font-semibold tracking-[0.3em] uppercase">NOVELLNO</h1>
                            <p className="text-[10px] text-[#bfb29c] mt-1 tracking-[0.3em]">CARE RECIPE CHECK</p>
                        </header>

                        <main className="flex-1 p-6 flex flex-col -mt-4 bg-[#f8f4ec] rounded-t-[2rem] overflow-y-auto custom-scrollbar">
                            {step === 'intro' ? (
                                <div className="flex-1 flex flex-col justify-center text-center space-y-6 animate-fade-in py-4">
                                    <div className="space-y-3">
                                        <Icon name="leaf" size={36} className="text-[#a9927a] mx-auto" />
                                        <p className="text-[10px] text-[#a9927a] tracking-[0.25em] font-bold">あなたの髪の個性に合わせて選ぶ</p>
                                        <h2 className="font-serif-jp text-2xl font-semibold text-[#4a4238] leading-relaxed">ケアレシピ診断</h2>
                                        <p className="text-[11px] text-[#8a7a63] leading-relaxed px-2">NOVELLNOのホームケアは、サロントリートメントと連動し、毎日のケアで髪のコンディションをアップデートするヘアケアシリーズ。<br/>2つの質問に答えるだけで、髪の個性に寄り添うあなただけのケアレシピをご提案します。</p>
                                    </div>

                                    <div className="space-y-3 text-left">
                                        <div className="bg-white/70 border border-[#e3d9c6] rounded-2xl p-4">
                                            <div className="font-serif-jp text-[#a9927a] font-bold text-sm mb-1">01<span className="text-[#4a4238] ml-3 text-[13px]">サロンケア商品と同じ成分を配合</span></div>
                                            <p className="text-[10px] text-[#8a7a63] leading-relaxed">サロン施術で使用するアイテムと同一商品・同成分を配合。ホームケアのみでも、サロンと同様の仕上がりをご体感いただけます。</p>
                                        </div>
                                        <div className="bg-white/70 border border-[#e3d9c6] rounded-2xl p-4">
                                            <div className="font-serif-jp text-[#a9927a] font-bold text-sm mb-1">02<span className="text-[#4a4238] ml-3 text-[13px]">40日間で髪がアップデートする新習慣</span></div>
                                            <p className="text-[10px] text-[#8a7a63] leading-relaxed">ダメージレベルに合わせて必要な成分を選択的に補修し、毛先まで均一に届けて定着。毎日のケアで補修を積み重ねます。</p>
                                        </div>
                                    </div>

                                    <button onClick={() => setStep('q1')} className="w-full py-4 bg-[#4a4238] text-[#f3ede1] rounded-2xl font-bold shadow-lg tracking-widest">診断をはじめる</button>
                                </div>
                            ) : step === 'result' ? (
                                <div className="space-y-4 pb-10 animate-fade-in pt-2">
                                    <ProgressBar current={3} />
                                    <div className="text-center">
                                        <Icon name="sparkles" size={30} className="text-[#a9927a] mx-auto mb-2" />
                                        <h2 className="font-serif-jp text-2xl font-semibold text-[#4a4238]">あなたのケアレシピ</h2>
                                        <p className="text-[10px] text-[#8a7a63] mt-1 tracking-widest">{answers.shampoo}＋{answers.treatment} RECIPE</p>
                                    </div>

                                    <div className="bg-white/80 border border-[#e3d9c6] rounded-2xl p-5 shadow-sm">
                                        <h3 className="font-serif-jp text-[15px] font-bold text-[#4a4238] leading-snug mb-2">{answers.shampoo}＋{answers.treatment}｜{recipe.title}</h3>
                                        <p className="text-[11px] text-[#5c5245] leading-relaxed">{recipe.copy}</p>
                                        <p className="text-[8px] text-[#a99e8c] mt-2 leading-relaxed">{recipe.note}</p>
                                    </div>

                                    <ProductCard label="Shampoo" item={sh} />
                                    <ProductCard label="Treatment" item={tr} />

                                    <div className="bg-white/70 border border-[#e3d9c6] rounded-2xl p-3">
                                        <p className="text-[10px] text-[#8a7a63] leading-relaxed"><span className="font-bold text-[#4a4238]">トリートメントのご使用方法：</span>シャンプー後、軽く水気を切り、毛先から中間に適量を塗布します。髪全体に馴染ませ、3〜5分ほど置いた後、よくすすいでください。</p>
                                    </div>

                                    <div className="text-center pt-3">
                                        <div className="font-serif-jp text-sm font-semibold text-[#4a4238] tracking-wider flex items-center justify-center gap-2"><Icon name="plus" size={14} className="text-[#a9927a]"/>仕上がりレベルを底上げする2種のホームケア</div>
                                    </div>

                                    {outbath.map((item, i) => (
                                        <div key={i} className={`p-4 border-l-4 rounded-r-2xl ${item.style} shadow-sm animate-fade-in`}>
                                            <div className="text-[9px] font-bold opacity-60 uppercase tracking-widest">Outbath</div>
                                            <div className="font-serif-jp text-lg font-semibold mt-0.5">{item.name}</div>
                                            <div className="text-[9px] opacity-60 tracking-widest">{item.kana}</div>
                                            <p className="text-[11px] mt-2 leading-relaxed">{item.desc}</p>
                                            <p className="text-[8px] mt-1.5 opacity-70 leading-relaxed">特徴成分：{item.ingredients}</p>
                                            <p className="text-[9px] mt-1.5 leading-relaxed opacity-90"><span className="font-bold">使い方：</span>{item.usage}</p>
                                            {item.dosage && <p className="text-[8px] mt-1 opacity-70">{item.dosage}</p>}
                                            <div className="text-right mt-2 pt-2 border-t border-black/5">
                                                <span className="text-[10px] font-bold">{item.price}</span>
                                            </div>
                                        </div>
                                    ))}

                                    <div className="text-center bg-[#efe8db] rounded-2xl p-4">
                                        <div className="text-[9px] font-bold text-[#a9927a] tracking-[0.3em] mb-1">FRAGRANCE</div>
                                        <p className="text-[11px] text-[#5c5245]">心を満たすフルーティーウッディの香り<span className="text-[9px] text-[#8a7a63]">（全アイテム共通）</span></p>
                                    </div>

                                    <p className="text-[9px] text-[#a99e8c] text-center">※価格はすべて税込です。</p>

                                    <button onClick={restart} className="w-full py-4 border-2 border-[#e3d9c6] rounded-2xl text-[#a9927a] font-bold flex items-center justify-center gap-2 active:bg-[#efe8db]"><Icon name="refresh" size={16}/> 診断トップへ戻る</button>
                                </div>
                            ) : (
                                <div className="space-y-5 animate-fade-in pt-2">
                                    <ProgressBar current={step === 'q1' ? 1 : 2} />
                                    <div>
                                        <div className="text-[10px] font-bold text-[#c0ac8e] tracking-[0.3em] mb-1">{step === 'q1' ? 'STEP 01 — SHAMPOO' : 'STEP 02 — TREATMENT'}</div>
                                        <h2 className="font-serif-jp text-xl font-semibold text-[#4a4238]">{step === 'q1' ? '今の髪の状態に、1番近いものは？' : '理想の仕上がりは？'}</h2>
                                        <p className="text-[11px] text-[#8a7a63] mt-1">{step === 'q1' ? '髪の履歴から、シャンプーを選ぶ' : 'なりたい質感から、トリートメントを選ぶ'}</p>
                                    </div>
                                    <div className="grid gap-3">
                                        {(step === 'q1' ? q1Options : q2Options).map(o => {
                                            const p = step === 'q1' ? products.shampoo[o.id] : products.treatment[o.id];
                                            return (
                                                <button key={o.id} onClick={() => selectAnswer(step === 'q1' ? 'shampoo' : 'treatment', o.id)} className="p-4 border-2 border-[#e3d9c6] rounded-2xl bg-white/80 text-left shadow-sm active:border-[#a9927a] transition-all">
                                                    <div className="flex gap-3 items-start">
                                                        <div className="font-serif-jp text-xl text-[#c0ac8e] font-semibold leading-none pt-0.5">{o.label}</div>
                                                        <div className="flex-1">
                                                            <div className="text-[11px] font-bold text-[#4a4238] leading-relaxed">{o.text}</div>
                                                            <div className="mt-2 pt-2 border-t border-[#efe8db] flex items-baseline gap-2">
                                                                <span className="font-serif-jp text-sm font-semibold text-[#8a7a63]">{p.name}</span>
                                                                <span className="text-[8px] text-[#a99e8c] tracking-widest">{p.kana}</span>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>
                            )}
                        </main>
                        <footer className="p-4 bg-[#efe8db] text-[9px] text-center text-[#a99e8c] shrink-0 italic font-medium tracking-[0.25em] uppercase">Supported by MIAN NOVELLNO</footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
